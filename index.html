<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Directorio</title>


    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</head>

<body class="bg-light vh-100 vw-100">

    <div id="reai-loader" class="w-100 h-100 border d-flex justify-content-center align-items-center">
        <div class="text-center">
            <div class="spinner-border" style="color: #7F1E57;"></div>
            <div class="mt-3">Cargando directorio...</div>
        </div>
    </div>

    <div id="reai-container" class="container-fluid d-flex flex-column h-100 visually-hidden">
        <div class="input-group py-3">
            <input type="text" id="reai-search" class="form-control" placeholder="Buscar por nombre o folio">

            <button class="btn btn-outline-danger" id="reai-clear">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-trash3"
                    viewBox="0 0 16 16">
                    <path
                        d="M6.5 1h3a.5.5 0 0 1 .5.5v1H6v-1a.5.5 0 0 1 .5-.5M11 2.5v-1A1.5 1.5 0 0 0 9.5 0h-3A1.5 1.5 0 0 0 5 1.5v1H1.5a.5.5 0 0 0 0 1h.538l.853 10.66A2 2 0 0 0 4.885 16h6.23a2 2 0 0 0 1.994-1.84l.853-10.66h.538a.5.5 0 0 0 0-1zm1.958 1-.846 10.58a1 1 0 0 1-.997.92h-6.23a1 1 0 0 1-.997-.92L3.042 3.5zm-7.487 1a.5.5 0 0 1 .528.47l.5 8.5a.5.5 0 0 1-.998.06L5 5.03a.5.5 0 0 1 .47-.53Zm5.058 0a.5.5 0 0 1 .47.53l-.5 8.5a.5.5 0 1 1-.998-.06l.5-8.5a.5.5 0 0 1 .528-.47M8 4.5a.5.5 0 0 1 .5.5v8.5a.5.5 0 0 1-1 0V5a.5.5 0 0 1 .5-.5" />
                </svg>
            </button>

        </div>
        <div class="row flex-grow-1 pb-3">
            <div class="col-md-5 d-flex flex-column">

                <div class="text-white text-center py-2 rounded-top" style="background-color:#7F1E57;">
                    <h5 class="mb-0">Directorio</h5>
                </div>

                <div class="list-group overflow-auto flex-grow-1 shadow-sm" id="reai-directory"></div>

                <div class="d-flex justify-content-between align-items-center mt-2">
                    <button type="button" class="btn btn-light fs-5" id="reai-prev">←</button>
                    <span id="reai-range" style="user-select: none;"></span>
                    <button type="button" class="btn btn-light fs-5" id="reai-next">→</button>
                </div>
            </div>

            <div class="col-md-7 d-flex flex-column">

                <div class="card shadow-sm d-flex flex-column flex-grow-1">

                    <div class="card-body d-flex flex-column flex-grow-1">

                        <div id="reai-head" class="text-center">
                            <strong>Selecciona un elemento para mostrar mas información.</strong>
                        </div>

                        <hr>

                        <div id="reai-info" class="d-flex flex-column flex-grow-1"></div>

                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="opt.js"></script>

</body>

</html>
