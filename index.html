<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Directorio Moderno</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</head>

<body class="bg-light">

    <div class="container-fluid mt-3 min-vh-100">
        <div class="row h-100">

            <div class="mb-3">
                <input type="text" id="buscador" class="form-control" placeholder="Buscar por nombre o folio...">
            </div>

            <!-- LISTA LATERAL -->
            <div class="col-md-4 d-flex flex-column">
                <div class="bg-secondary text-white text-center py-2 rounded-top">
                    <h5 class="mb-0">Directorio</h5>
                </div>

                <div class="list-group overflow-auto flex-grow-1 shadow-sm" id="lista"></div>

                <div class="d-flex justify-content-between align-items-center mt-2">
                    <span id="range"></span>
                    <div>
                        <button class="btn btn-outline-secondary btn-sm" id="prev">‹</button>
                        <button class="btn btn-outline-secondary btn-sm" id="next">›</button>
                    </div>
                </div>
            </div>

            <!-- DETALLE -->
            <div class="col-md-8 d-flex flex-column">
                <div class="card shadow-sm flex-grow-1 d-flex flex-column">
                    <div class="card-body d-flex flex-column">
                        <div class="text-center">
                            <img id="logo" class="rounded-circle mb-3 border" width="120" alt="Logo">
                            <h5 id="nombre" class="fw-bold"></h5>
                            <p>
                                <strong>Representante Legal:</strong>
                                <span id="representante"></span>
                            </p>
                        </div>

                        <hr>

                        <div id="info" class="flex-grow-1 overflow-auto"></div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        const escapeHTML = str => {
            if (!str) return "";
            return String(str)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        };

        const pageSize = 6;
        let currentPage = 1;
        let data = [];

        // CSV parser robusto con comillas
        const csvToJson = async url => {
            const res = await fetch(url);
            const text = await res.text();
            const lines = text.trim().split("\n");

            const parseLine = line => {
                const result = [];
                let current = "";
                let inQuotes = false;

                for (let i = 0; i < line.length; i++) {
                    const char = line[i];
                    if (char === '"' && line[i + 1] === '"') {
                        current += '"';
                        i++;
                    } else if (char === '"') {
                        inQuotes = !inQuotes;
                    } else if (char === ',' && !inQuotes) {
                        result.push(current);
                        current = "";
                    } else {
                        current += char;
                    }
                }
                result.push(current);
                return result;
            };

            const headers = parseLine(lines[0]);
            return lines.slice(1).map(line => {
                const values = parseLine(line);
                return headers.reduce((obj, header, i) => ({ ...obj, [header]: values[i] }), {});
            });
        };

        // Renderiza la lista lateral
        const renderList = () => {
            //si hay busqueda
            const sourceData = document.getElementById("buscador").value !== "" ? filteredData : data;

            const start = (currentPage - 1) * pageSize;
            const end = start + pageSize;
            const page = sourceData.slice(start, end);

            const lista = document.getElementById("lista");
            lista.innerHTML = "";

            page.forEach(item => {
                const a = document.createElement("a");
                a.className = "list-group-item list-group-item-action d-flex align-items-center gap-3";

                const fotoURL = item.FOTO || 'https://via.placeholder.com/120';
                const folioText = escapeHTML(item.FOLIO)

                a.innerHTML = `
                    <img src="${fotoURL}" width="40" class="rounded" alt="Logo">
                    <span>${folioText || ''}</span>
                `;
                a.onclick = () => showDetail(item);
                lista.appendChild(a);
            });

            document.getElementById("range").textContent =
                `${sourceData.length > 0 ? start + 1 : 0} - ${Math.min(end, sourceData.length)} / ${sourceData.length}`;
        };

        // Renderiza detalles con acordeón dinámico
        const showDetail = item => {

            const nombre = escapeHTML(item["NOMBRE COMERCIAL"]);
            const representante = escapeHTML(item["REPRESENTANTE LEGAL"]);
            const entrega = escapeHTML(item.ENTREGA);
            const vigencia = escapeHTML(item.VIGENCIA);
            const domicilio = escapeHTML(item.DOMICILIO);
            const municipio = escapeHTML(item.MUNICIPIO);
            const quejas = escapeHTML(item["QUEJAS Y DENUNCIAS"]);

            document.getElementById("logo").src = item.FOTO || 'https://via.placeholder.com/120';
            document.getElementById("nombre").textContent = nombre;
            document.getElementById("representante").textContent = representante;

            const sections = [
                {
                    title: "General",
                    content: `
                        <p><strong>Fecha de inicio:</strong> ${entrega || ''}</p>
                        <p><strong>Fecha de vencimiento:</strong> ${vigencia || ''}</p>
                    `
                },
                {
                    title: "Información domiciliaria",
                    content: `
                        <p><strong>Dirección:</strong> ${domicilio || ''}</p>
                        <p><strong>Municipio:</strong> ${municipio || ''}</p>
                    `
                },
                {
                    title: "Quejas y denuncias",
                    content: `<p>${quejas || ''}</p>`
                }
            ];

            document.getElementById("info").innerHTML = `
                <div class="accordion" id="accordionInfo">
                    ${sections.map((section, i) => `
                        <div class="accordion-item">
                            <h2 class="accordion-header" id="heading${i}">
                                <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapse${i}" aria-expanded="false" aria-controls="collapse${i}">
                                    ${section.title}
                                </button>
                            </h2>
                            <div id="collapse${i}" class="accordion-collapse collapse" aria-labelledby="heading${i}" data-bs-parent="#accordionInfo">
                                <div class="accordion-body">
                                    ${section.content}
                                </div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        };

        // Paginación
        document.getElementById("prev").onclick = () => {
            if (currentPage > 1) {
                currentPage--;
                renderList();
            }
        };

        document.getElementById("next").onclick = () => {
            if (currentPage * pageSize < data.length) {
                currentPage++;
                renderList();
            }
        };

        // Carga CSV
        csvToJson("Data.csv").then(r => {
            filteredData = r;
            data = r;
            renderList();
        });

        //Filtrar datos
        let filteredData = [];

        const filterData = (query) => {
            const term = query.toLowerCase().trim();

            filteredData = data.filter(item => {
                const nombre = (item["NOMBRE COMERCIAL"] || "").toLowerCase();
                const folio = (item.FOLIO || "").toLowerCase();
                const representante = (item["REPRESENTANTE LEGAL"] || "").toLowerCase();
                const entrega = (item.ENTREGA || "").toLowerCase();
                const vigencia = (item.VIGENCIA || "").toLowerCase();

                return nombre.includes(term) || folio.includes(term) || representante.includes(term) || entrega.includes(term) || vigencia.includes(term);
            });

            currentPage = 1;
            renderList();
        };

        document.getElementById("buscador").addEventListener("input", (e) => {
            filterData(e.target.value);
        });
    </script>

</body>

</html>
