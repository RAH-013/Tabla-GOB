services:
  php:
    build: ./docker/php
    container_name: ci_php
    restart: always
    volumes:
      - ./backend:/var/www/html
    networks:
      - ci_network

  nginx:
    image: nginx:stable
    container_name: ci_nginx
    restart: always
    ports:
      - "8080:80"
    volumes:
      - ./backend:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
    networks:
      - ci_network

  mysql:
    image: mysql:8.0
    container_name: ci_mysql
    restart: always
    env_file:
      - ./.env
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf:ro
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - ci_network

networks:
  ci_network:
    driver: bridge

volumes:
  db_data: